[colors]
; Deep, rich background to make the light pastel fonts pop
background = #1e1e2e
; Subtle highlight for active workspaces
background-alt = #313244
foreground = #ffffff
primary = #8caaee
accent = #ca9ee6
warning = #e5c890
alert = #e78284
success = #a6d189
disabled = #a5adce
transparent = #00000000

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 24pt
radius = 10

background = ${colors.background}
foreground = ${colors.foreground}

border-top-size = 8pt
border-left-size = 12pt
border-right-size = 12pt
border-bottom-size = 0pt
border-color = ${colors.transparent}

padding-left = 2
padding-right = 2
module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

; --- MODULE LAYOUT ---
modules-left = workspaces weather cpu temperature memory 
modules-center = xwindow
modules-right = clipboard eth wlan vpn pulseaudio bat-health battery bluetooth time shutdown_menu systray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; --- NATIVE POLYBAR MODULES ---

[module/systray]
type = internal/tray
tray-spacing = 6pt
tray-background = ${colors.background}

[module/workspaces]
type = internal/i3
pin-workspaces = true
format = <label-state>

label-focused = %name%
label-focused-foreground = ${colors.accent}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.accent}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.disabled}
label-visible-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 5
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.accent}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = "󰻠 "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/temperature]
type = internal/temperature
interval = 5
thermal-zone = 0
warn-temperature = 75
format = <ramp> <label>
format-warn = <ramp> <label-warn>
label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}
ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.warning}

[module/eth]
type = internal/network
interface-type = wired
interval = 5
format-connected = <label-connected>
format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %ifname% 󰁅 %downspeed%

format-disconnected = <label-disconnected>
label-disconnected = 󰈂 
label-disconnected-foreground = ${colors.alert}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <ramp-signal> <label-connected>
label-connected = %essid% 󰁅 %downspeed%
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
ramp-signal-foreground = ${colors.primary}

format-disconnected = <label-disconnected>
label-disconnected = 󰤭 
label-disconnected-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.accent}

format-muted = <label-muted>
label-muted = 󰖁 Muted
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/battery]
type = internal/battery
full-at = 98
low-at = 20
battery = BAT0
adapter = AC
poll-interval = 30
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁾
ramp-capacity-2 = 󰁹
ramp-capacity-foreground = ${colors.success}
animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-foreground = ${colors.warning}

[module/time]
type = internal/date
interval = 1
time = "%H:%M"
date = "%a, %d %b"
label = %date%  %time%
label-foreground = ${colors.primary}

; --- CUSTOM SCRIPTS ---

[module/weather]
type = custom/script
exec = ~/.config/i3/scripts/openweather-city
interval = 3600
format-foreground = ${colors.primary}

[module/vpn]
type = custom/script
exec = ~/.config/i3/scripts/forticlient
interval = 10
format-foreground = ${colors.accent}

[module/bluetooth]
type = custom/script
exec = ~/.config/i3/scripts/bt-status
interval = 5
format-foreground = ${colors.primary}
click-left = kitty -e bluetui

[module/bat-health]
type = custom/script
exec = ~/.config/i3/scripts/bat-health
interval = 3600
format-foreground = ${colors.alert} 

[module/clipboard]
type = custom/script
exec = ~/.config/i3/scripts/clipboard-status
interval = 5
format-foreground = ${colors.accent}
click-left = sh -c "CM_LAUNCHER=rofi clipmenu -theme /home/rf/.config/rofi/clipmenu.rasi"
click-right = sh -c "clipctl disable; notify-send 'Clipboard: tracking paused'; sleep 5; clipctl enable; notify-send 'Clipboard: tracking resumed'"

[module/shutdown_menu]
type = custom/text
format = "󰐥 "
format-foreground = ${colors.alert}
click-left = ~/.config/i3/scripts/powermenu
